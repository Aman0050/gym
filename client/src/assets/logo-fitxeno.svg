<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 80" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&amp;display=swap');
      .text {
        font-family: 'Playfair Display', serif;
        font-size: 72px;
        letter-spacing: -2px;
      }
      .normal {
        font-weight: 900;
        font-style: normal;
        fill: #ffffff;
        stroke: #ffffff;
        stroke-width: 2.5px;
        stroke-linejoin: round;
      }
      .italic-orange {
        font-weight: 900;
        font-style: italic;
        fill: #a0522d;
        stroke: #a0522d;
        stroke-width: 2.5px;
        stroke-linejoin: round;
      }
    </style>
  </defs>

  <g transform="translate(190, 65)">
    <text x="0" y="0" text-anchor="middle" class="text">
      <tspan class="normal">FIT</tspan><tspan class="italic-orange">XENO</tspan>
    </text>
  </g>
</svg>
